<!DOCTYPE html>
<html>
  <head>
    <title>Caption Blocker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="stripes">
      <h2 class="title">CAPTION BLOCKER</h2>
      <div class="buttons">

    </div>
    <script src="popup.js"></script>
  </body>
</html>
